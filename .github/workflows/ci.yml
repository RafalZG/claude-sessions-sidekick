name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClaudeSessionsSidekick.sln

      - name: Build
        run: dotnet build ClaudeSessionsSidekick.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ClaudeSessionsSidekick.sln --configuration Release --no-build --verbosity minimal
